<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 파비콘 -->
    <link
      rel="icon"
      type="image/png"
      href="img/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="img/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="img/favicon/site.webmanifest" />
    <!-- seo 최적화 -->
    <!-- 웹페이지의 설명을 정의 -->
    <meta name="description" content="SHUCLE 웹 사이트입니다." />
    <!-- 웹페이지와 관련된 키워드를 정의 -->
    <meta name="keywords" content="SHUCLE, 셔클" />
    <!-- 웹페이지의 저자를 정의  -->
    <meta name="author" content="SHUCLE" />
    <!-- 소셜 미디어에서 페이지가 공유될때 사용되는 제목 -->
    <meta property="og:title" content="SHUCLE" />
    <!-- 소셜 미디어에서 페이지가 공유될 때 표시되는 사이트 이름 -->
    <meta property="og:site_name" content="SHUCLE 웹사이트" />
    <!-- 소셜 미디어에서 페이지가 웹사이트임을 명시 -->
    <meta property="og:type" content="website" />
    <!-- Open Graph 프로토콜에서 사용되는 메타 태그의 속성 중 하나로, 
     페이지의 간략한 설명을 제공하는 데 사용 -->
    <!-- 소셜 미디어에서 공유될 때 사용되는 URL -->
    <meta property="og:url" content="https://github.io/" />
    <!-- 소셜 미디어에서 페이지가 공유될 때 표시되는 이미지 -->
    <meta property="og:image" content="images/metaimg.png" />
    <!-- 소셜 미디어에서 페이지가 공유될 때 사용되는 설명 -->
    <meta property="og:description" content="SHUCLE 웹사이트입니다." />
    <!-- css 연결 -->
    <link rel="stylesheet" href="css/main.css" />
    <title>SHUCLE</title>
  </head>
  <body>
    <!-- 전체 -->
    <div class="wrap">
      <!-- 헤더 -->
      <header class="header">
        <div class="header-inner inner">
          <!-- 로고 -->
          <div class="header-logo">
            <a href="#">
              <img src="img/logo.png" alt="셔클 로고" />
            </a>
          </div>
          <!-- 메뉴 -->
          <nav class="nav">
            <ul class="menu-list">
              <li><a href="#">홈</a></li>
              <li><a href="#">솔루션</a></li>
              <li><a href="#">기술</a></li>
              <li><a href="#">도입 사례</a></li>
              <li><a href="#">이용자 앱</a></li>
              <li><a href="#">스토리</a></li>
            </ul>
            <!-- 언어 -->
            <div class="lang">
              <a href="#">EN</a>
            </div>
          </nav>
        </div>
      </header>
      <!-- 메인 -->
      <main class="main">
        <!-- 비주얼 -->
        <div class="main-visual">
          <div class="visual-inner inner">
            <h1 class="visual-txt">
              지속가능한 도시를 위한<br />
              통합모빌리티 플랫폼, 셔클
            </h1>
          </div>
        </div>
        <!-- 셔클 소개 -->
        <div class="info-inner inner">
          <div class="info-txt">
            <h4>셔클은 현대자동차의 통합 모빌리티 플랫폼으로,</h4>
            <p>
              AI 기술을 활용한 다양한 모빌리티 솔루션을 제공하여 지역의 교통
              문제를 해결하고 <br />
              모든 사람이 제약없이 자유롭게 이동하는 도시를 만듭니다.
            </p>
          </div>
          <!-- 셔클 이미지 -->
          <ul class="info-img">
            <li>
                <img src="img/home_2_1.webp" alt="인포 이미지1">
            </li>
            <li>
                <img src="img/home_2_2.webp" alt="인포 이미지2">
            </li>
            <li>
                <img src="img/home_2_3.jpg" alt="인포 이미지3">
            </li>
            <li>
                <img src="img/home_2_4.webp" alt="인포 이미지4">
            </li>
          </ul>
        </div>
        <!-- 기술소개 / 기술보기 -->
      </main>
    </div>
  </body>
</html>
